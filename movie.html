<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Movies</title>

  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", "Yu Mincho", serif;
      background: #fffaf7;
      color: #5a4638;
    }

    header {
      padding: 24px 16px;
      text-align: center;
      background: #f7e6d8;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
      font-weight: normal;
    }

    header p {
      margin: 8px 0 0;
      font-size: 14px;
    }

    .movie-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    .movie-card {
      margin-bottom: 40px;
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .movie-card h2 {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: normal;
      text-align: center;
    }

    .youtube-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
    }

    .youtube-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .back-link {
      text-align: center;
      margin-top: 30px;
    }

    .back-link a {
      color: #5a4638;
      text-decoration: none;
      border-bottom: 1px solid #5a4638;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Wedding Movies</h1>
  <p>結婚式のムービーをこちらからご覧いただけます</p>
</header>

<main class="movie-page">

  <section class="movie-card">
    <h2>Opening Movie</h2>
    <div class="youtube-wrap">
      <iframe src="https://youtu.be/HkBP6MGIUS4" allowfullscreen></iframe>
    </div>
  </section>

  <section class="movie-card">
    <h2>Profile Movie</h2>
    <div class="youtube-wrap">
      <iframe src="https://youtu.be/VNrtuzO8tv4" allowfullscreen></iframe>
    </div>
  </section>

  <section class="movie-card">
    <h2>Endroll</h2>
    <div class="youtube-wrap">
      <iframe src="https://youtu.be/lIaP0amoo8Q" allowfullscreen></iframe>
    </div>
  </section>

  <section class="movie-card">
    <h2>4択クイズ</h2>
    <div class="youtube-wrap">
      <iframe src="https://youtu.be/sz4NAYK3BVI" allowfullscreen></iframe>
    </div>
  </section>

  <section class="movie-card">
    <h2>OP+Profile　二次会用</h2>
    <div class="youtube-wrap">
      <iframe src="https://youtu.be/_T3A23nXK-0" allowfullscreen></iframe>
    </div>
  </section>

  <div class="back-link">
    <a href="index.html">← Topへ戻る</a>
  </div>

</main>

</body>
</html>
