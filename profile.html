<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Book</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Times New Roman", "Yu Mincho", serif;
      background: #f7f1ea;
      color: #333;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 14px 40px;
    }

    .title {
      font-size: 22px;
      letter-spacing: 0.12em;
      margin: 10px 0 18px;
      font-weight: normal;
    }

    .book-wrap {
      width: 100%;
      max-width: 430px;
      position: relative;
    }

    .book-img {
      width: 100%;
      display: block;
      border-radius: 6px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      background: #fff;
      transition: opacity 0.25s ease;
    }

    .nav {
      width: 100%;
      max-width: 430px;
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    button {
      flex: 1;
      border: 1px solid #b8aa9b;
      background: rgba(255,255,255,0.75);
      color: #333;
      padding: 12px 10px;
      font-size: 14px;
      letter-spacing: 0.08em;
      border-radius: 999px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .count {
      font-size: 13px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      color: #666;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #777;
      letter-spacing: 0.06em;
    }

    @media (min-width: 768px) {
      .book-wrap,
      .nav {
        max-width: 520px;
      }

      .title {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="title">Profile Book</h1>

    <div class="book-wrap">
      <img id="bookImage" class="book-img" src="profile/cover1.jpg" alt="Profile Book">
    </div>

    <div class="nav">
      <button id="prevBtn">← Prev</button>
      <div class="count"><span id="current">1</span> / <span id="total">6</span></div>
      <button id="nextBtn">Next →</button>
    </div>

    <div class="hint">Tap or swipe to turn pages</div>
  </main>

  <script>
    const images = [
      "profile/cover1.jpg",
      "profile/slide2.jpg",
      "profile/slide3.jpg",
      "profile/slide4.jpg",
      "profile/cover2.jpg",
      "profile/slide1.jpg",
    ];

    let index = 0;

    const bookImage = document.getElementById("bookImage");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const current = document.getElementById("current");
    const total = document.getElementById("total");

    total.textContent = images.length;

    // 先読み
    images.forEach(src => {
      const img = new Image();
      img.src = src;
    });

    function showPage(newIndex) {
      if (newIndex < 0 || newIndex >= images.length) return;

      bookImage.style.opacity = 0;

      setTimeout(() => {
        index = newIndex;
        bookImage.src = images[index];
        current.textContent = index + 1;

        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === images.length - 1;

        bookImage.style.opacity = 1;
      }, 180);
    }

    prevBtn.addEventListener("click", () => {
      showPage(index - 1);
    });

    nextBtn.addEventListener("click", () => {
      showPage(index + 1);
    });

    bookImage.addEventListener("click", () => {
      showPage(index + 1);
    });

    // スワイプ対応
    let startX = 0;

    bookImage.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
    });

    bookImage.addEventListener("touchend", e => {
      const endX = e.changedTouches[0].clientX;
      const diff = startX - endX;

      if (Math.abs(diff) > 50) {
        if (diff > 0) {
          showPage(index + 1);
        } else {
          showPage(index - 1);
        }
      }
    });

    showPage(0);
  </script>
</body>
</html>
